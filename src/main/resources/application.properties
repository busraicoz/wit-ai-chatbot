server.port=8080
spring.application.name=ing-wit-ai-workshop

# Vertex AI Settings (fill this in Task 2/3)
spring.ai.vertex.ai.gemini.project-id=<YOUR_PROFILE_PROJECT_ID>
spring.ai.vertex.ai.gemini.location=europe-west4
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-pro

# Vertex AI Embedding Model
spring.ai.vertex.ai.embedding.options.model=gemini-embedding-001
spring.ai.vertex.ai.embedding.project-id=<YOUR_PROFILE_PROJECT_ID>
spring.ai.vertex.ai.embedding.location=europe-west4

# RAG Configuration Defaults
app.rag.default-top-k=3
app.rag.chunk-size=800
app.rag.overlap=120